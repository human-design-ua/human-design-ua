<!DOCTYPE html>
<html lang="ua">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дякуємо за замовлення — Дизайн Людини</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <script src="assets/js/theme.js"></script>
</head>
<body>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;background:var(--bg,#0D0B1E);">
  <canvas id="confettiCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:999;"></canvas>
  <div style="max-width:480px;width:100%;">
    <div id="successIcon" style="font-size:3rem;margin-bottom:1.5rem;animation:successPulse 1.5s ease-in-out infinite;">✦</div>
    <h1 id="successTitle" style="font-family:Georgia,serif;font-size:clamp(1.3rem,4vw,2rem);color:#F0ECE8;margin-bottom:.75rem;line-height:1.3;"></h1>
    <p id="successSubtitle" style="font-size:.9rem;color:#A090C0;margin-bottom:1.5rem;"></p>
    <div style="max-width:300px;margin:0 auto 1rem;">
      <div style="background:rgba(212,168,48,.15);border-radius:100px;height:8px;overflow:hidden;">
        <div id="genFill" style="height:100%;background:linear-gradient(90deg,#D4A830,#E8C55A);border-radius:100px;width:0%;transition:width .5s ease;"></div>
      </div>
    </div>
    <p id="genText" style="font-size:.8rem;color:#6B5F80;margin-bottom:1.5rem;"></p>
    <p id="etaText" style="font-size:.85rem;color:#A090C0;"></p>
  </div>
</div>

<style>
@keyframes successPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>

<script src="assets/js/analytics.js"></script>
<script src="locales/translations.js"></script>
<script src="assets/js/i18n.js"></script>
<script>
  // Fire GA4 & Pixel purchase event
  var savedPlan = localStorage.getItem('hd_plan');
  var amount = savedPlan === 'full' ? 799 : 399;
  if (typeof gtag !== 'undefined') {
    gtag('event', 'purchase', { currency: 'UAH', value: amount });
  }
  if (typeof fbq !== 'undefined') {
    fbq('track', 'Purchase', { currency: 'UAH', value: amount });
  }
</script>
<script>
(function(){
  // Get name and language
  var name = '';
  try {
    var d = JSON.parse(localStorage.getItem('hd_quiz_data') || '{}');
    name = d.name || localStorage.getItem('hd_name') || '';
  } catch(e){}

  // Wait for i18n to be ready
  function init() {
    var lang = localStorage.getItem('hd_lang') || 'ua';
    var trs = (typeof HD_TRANSLATIONS !== 'undefined' && HD_TRANSLATIONS[lang])
      ? HD_TRANSLATIONS[lang] : {};

    function tr(key) { return trs[key] || key; }

    // Set title with name
    var title = document.getElementById('successTitle');
    var sub   = document.getElementById('successSubtitle');
    var etaText = document.getElementById('etaText');

    if (title) title.textContent = (name ? name + ', ' : '') + tr('success.title');
    if (sub)   sub.textContent   = tr('success.subtitle');
    if (etaText) etaText.textContent = tr('success.eta');

    // Animate progress
    var fill    = document.getElementById('genFill');
    var genText = document.getElementById('genText');
    var gates   = 0;
    var total   = 64;

    var interval = setInterval(function(){
      gates += 6;
      if (gates > total) gates = total;
      var pct = (gates / total * 100);
      if (fill) fill.style.width = pct + '%';

      var gatesText = tr('success.gates')
        .replace('{{gates}}', gates)
        .replace('{{total}}', total);
      if (genText) genText.textContent = gatesText;

      if (gates >= total) {
        clearInterval(interval);
        if (genText)  genText.textContent  = tr('success.done');
        if (etaText)  etaText.textContent  = tr('success.sent');
        launchConfetti();
      }
    }, 400);
  }

  // Run after DOM + translations ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Simple confetti
  function launchConfetti() {
    var canvas = document.getElementById('confettiCanvas');
    if (!canvas) return;
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    var ctx = canvas.getContext('2d');
    var particles = [];
    var colors = ['#D4A830','#9B6EE0','#E8C55A','#F0ECE8','#4CAF7D'];
    for (var i = 0; i < 80; i++) {
      particles.push({
        x: canvas.width * (i / 80), y: -10 - i * 3,
        vx: (i % 5 - 2) * 0.8, vy: 2 + (i % 3),
        color: colors[i % colors.length],
        size: 5 + (i % 5), rot: i * 20
      });
    }
    var anim = setInterval(function(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var alive = false;
      particles.forEach(function(p){
        p.x += p.vx; p.y += p.vy; p.rot += 3;
        if (p.y < canvas.height) alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
      });
      if (!alive) clearInterval(anim);
    }, 16);
  }
})();
</script>

</body>
</html>
