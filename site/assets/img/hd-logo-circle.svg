<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#E8C55A"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="bgFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#EDE6FF"/>
    </radialGradient>
  </defs>

  <!-- Circle: light lavender fill + gold border -->
  <circle cx="100" cy="100" r="94" fill="url(#bgFill)" stroke="url(#goldStroke)" stroke-width="3.5"/>

  <!--
    H — serif style: two verticals + crossbar + small serif caps
    Using rect + small horizontal serif caps at top/bottom of each vertical
  -->

  <!-- H left vertical -->
  <rect x="28" y="52" width="13" height="96" rx="1" fill="url(#goldStroke)"/>
  <!-- H left top serif -->
  <rect x="22" y="52" width="25" height="6"  rx="1" fill="url(#goldStroke)"/>
  <!-- H left bottom serif -->
  <rect x="22" y="142" width="25" height="6" rx="1" fill="url(#goldStroke)"/>

  <!-- H right vertical -->
  <rect x="79" y="52" width="13" height="96" rx="1" fill="url(#goldStroke)"/>
  <!-- H right top serif -->
  <rect x="73" y="52" width="25" height="6"  rx="1" fill="url(#goldStroke)"/>
  <!-- H right bottom serif -->
  <rect x="73" y="142" width="25" height="6" rx="1" fill="url(#goldStroke)"/>

  <!-- H crossbar -->
  <rect x="28" y="93" width="64" height="12" rx="1" fill="url(#goldStroke)"/>

  <!--
    D — serif style: vertical + curved right side
  -->
  <!-- D vertical -->
  <rect x="106" y="52" width="13" height="96" rx="1" fill="url(#goldStroke)"/>
  <!-- D top serif -->
  <rect x="100" y="52" width="25" height="6"  rx="1" fill="url(#goldStroke)"/>
  <!-- D bottom serif -->
  <rect x="100" y="142" width="25" height="6" rx="1" fill="url(#goldStroke)"/>

  <!-- D curve -->
  <path d="M118 58 Q170 58 170 100 Q170 142 118 142 L118 130 Q154 130 154 100 Q154 70 118 70 Z"
        fill="url(#goldStroke)"/>
</svg>
